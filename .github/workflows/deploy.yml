name: CI/CD – Gym Management System

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # Cho phép chạy thủ công từ GitHub UI

env:
  WEB_IMAGE: ql_phonggym_web
  SQL_IMAGE: ql_phonggym_sql

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: BUILD & PUSH IMAGES
  # ─────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: self-hosted          # PHẢI dùng Windows runner cho Windows Containers

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Switch Docker to Windows Containers mode
        run: |          
          Start-Sleep -Seconds 5
          docker version
        shell: powershell

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Web App image
        run: |
          docker build -f Dockerfile `
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WEB_IMAGE }}:latest `
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WEB_IMAGE }}:${{ github.sha }} `
            .
        shell: powershell

      - name: Build SQL Server image
        run: |
          docker build -f Dockerfile.sql `
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SQL_IMAGE }}:latest `
            -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SQL_IMAGE }}:${{ github.sha }} `
            .
        shell: powershell

      - name: Push images to Docker Hub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WEB_IMAGE }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SQL_IMAGE }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SQL_IMAGE }}:${{ github.sha }}
        shell: powershell

  # ─────────────────────────────────────────────
  # JOB 2: SMOKE TEST (chạy stack và kiểm tra)
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Switch Docker to Windows Containers mode
        run: |          
          Start-Sleep -Seconds 5
        shell: powershell

      - name: Start stack with docker compose
        run: docker compose up -d
        shell: powershell

      - name: Wait for services to be ready (90s)
        run: Start-Sleep -Seconds 90
        shell: powershell

      - name: Check all containers are running
        run: docker compose ps
        shell: powershell

      - name: Test Web App HTTP response
        run: |
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:8888" -UseBasicParsing -TimeoutSec 30 -ErrorAction Stop
            Write-Host "HTTP Status: $($response.StatusCode)"
            Write-Host "Web App OK"
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.Value__
            Write-Host "HTTP Status: $statusCode"
            # In ra body loi de xem exception thuc su (hoat dong sau khi customErrors=Off)
            $errBody = $_.Exception.Response.GetResponseStream()
            $reader = New-Object System.IO.StreamReader($errBody)
            $bodyText = $reader.ReadToEnd()
            Write-Host "=== ERROR BODY ==="
            Write-Host $bodyText
            Write-Host "=================="
            Write-Error "Web app returned HTTP $statusCode"
            exit 1
          }
        shell: powershell

      - name: Test SQL Server connectivity (PowerShell Version)
        run: |
          # Dùng thư viện có sẵn của hệ thống, không cần sqlcmd
          $connectionString = "Server=localhost,1433;Database=master;User Id=sa;Password=${{ secrets.SA_PASSWORD }};TrustServerCertificate=True;"
          $connection = New-Object System.Data.SqlClient.SqlConnection($connectionString)
          try {
              Write-Host "Đang thử kết nối SQL Server..."
              $connection.Open()
              Write-Host "✅ SQL Server OK (Kết nối thành công!)"
              $connection.Close()
          } catch {
              Write-Error "❌ Lỗi kết nối SQL Server: $($_.Exception.Message)"
              exit 1
          }
          Write-Host "SQL Server OK"
        shell: powershell

      - name: Show logs if tests failed
        if: failure()
        run: docker compose logs --tail=50
        shell: powershell

      - name: Cleanup
        if: always()
        run: docker compose down
        shell: powershell

  # ─────────────────────────────────────────────
  # JOB 3: DEPLOY lên Windows Server (tự host)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Windows Server
    runs-on: self-hosted          # Runner cài trên chính máy chủ Windows Server
    needs: smoke-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Pull latest images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WEB_IMAGE }}:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SQL_IMAGE }}:latest
        shell: powershell

      - name: Tag pulled images với tên local
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.WEB_IMAGE }}:latest ql_phonggym_web:latest
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.SQL_IMAGE }}:latest ql_phonggym_sql:latest
        shell: powershell

      - name: Restart only web_app (giữ nguyên sql_server để bảo toàn dữ liệu)
        run: docker compose up -d --no-deps --no-build web_app
        shell: powershell

      - name: Verify deployment
        run: |
          Write-Host "Dang cho he thong khoi dong (120s)..."
          Start-Sleep -Seconds 120

          try {
            $response = Invoke-WebRequest -Uri "http://localhost:8888" -UseBasicParsing -TimeoutSec 60 -ErrorAction Stop
            Write-Host "Status Code: $($response.StatusCode)"
            if ($response.StatusCode -eq 200) {
              Write-Host "THANH CONG: WEB DA ONLINE!"
            } else {
              Write-Host "Canh bao: HTTP $($response.StatusCode)"
            }
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.Value__
            Write-Host "HTTP Status: $statusCode"
            Write-Host "Loi: $($_.Exception.Message)"
            Write-Host "--- Container logs (web_app) ---"
            docker logs web_app --tail 30 2>&1
            Write-Host "--- Container logs (sql_server) ---"
            docker logs sql_server --tail 30 2>&1
            if ($statusCode -eq 500) {
              Write-Host "App dang chay nhung co Runtime Error (HTTP 500) - kiem tra logs phia tren"
              # Khong exit 1 - container dang chay, loi co the do config/DB
            } else {
              Write-Error "Khong the ket noi toi web app!"
              exit 1
            }
          }
        shell: powershell

      - name: Show container status
        if: always()
        run: |
          docker compose ps
          Write-Host "--- web_app logs ---"
          docker logs web_app --tail 50 2>&1
        shell: powershell
