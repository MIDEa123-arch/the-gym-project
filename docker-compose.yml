services:
  # ── Web Application (ASP.NET Framework 4.8 trên IIS) ──────────────────
  web_app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ql_phonggym_web:latest
    isolation: process           # Dùng chung kernel với Host - không cần Hyper-V, nhẹ hơn nhiều
    ports:
      - "8888:80"
    depends_on:
      sql_server:
        condition: service_healthy  # Chờ SQL Server healthy trước khi start
    networks:
      - gym_network
    restart: unless-stopped


  # ── SQL Server Express (build từ Dockerfile.sql + start.ps1) ──────────
  sql_server:
    build:
      context: .
      dockerfile: Dockerfile.sql
    image: ql_phonggym_sql:latest
    isolation: process           # Dùng chung kernel với Host - không cần Hyper-V, nhẹ hơn nhiều
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - sa_password=Admin@123!_Gym
      - attach_dbs=[]
    volumes:
      - sql_data:C:\Data
    networks:
      - gym_network
    restart: always
    healthcheck:
      test: ["CMD", "sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Admin@123!_Gym", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s


  # ── DB Seeder: chạy một lần để nạp dữ liệu mẫu (InitDB_Data.sql) ─────
  db_seeder:
    build:
      context: .
      dockerfile: Dockerfile.sql
    image: ql_phonggym_sql:latest
    isolation: process           # Dùng chung kernel với Host - không cần Hyper-V, nhẹ hơn nhiều
    depends_on:
      - sql_server
    environment:
      - ACCEPT_EULA=Y
    networks:
      - gym_network
    command: >-
      powershell -NoLogo -ExecutionPolicy Bypass -Command
      "Start-Sleep -Seconds 30; 
       Write-Host 'Seeding database...';
       sqlcmd -S sql_server -U sa -P 'Admin@123!_Gym' -d master -i C:\InitDB_Data.sql;
       Write-Host 'Seed complete.'"
    restart: "no"

networks:
  gym_network:
    driver: nat

volumes:
  sql_data: